<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrimony - Admin Approval Desk</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h2>Admin Approvals Control Desk</h2>
            <span class="badge" id="status-badge">Pending Verification</span>
        </div>

        <div class="verification-sheet" id="no-profile-msg">
            <p style="text-align: center; color: #777;">No pending profiles available for verification right now.</p>
        </div>

        <div class="verification-sheet hidden" id="profile-sheet">
            <div class="verification-meta">
                <div class="admin-photo-preview">
                    <img id="admin-preview-img" src="" alt="Pending Photo Preview">
                </div>
                <div class="admin-data-table">
                    <h3 id="adm-display-name">Profile Holder Name</h3>
                    <div class="table-grid">
                        <p><strong>Age:</strong> <span id="adm-age">-</span></p>
                        <p><strong>Religion/Caste:</strong> <span id="adm-rel-caste">-</span></p>
                        <p><strong>Edu/Profession:</strong> <span id="adm-edu-prof">-</span></p>
                        <p><strong>Location/Salary:</strong> <span id="adm-loc-sal">-</span></p>
                        <p><strong>Astro Info:</strong> <span id="adm-astro">-</span></p>
                        <p><strong>Physique/Status:</strong> <span id="adm-physique">-</span></p>
                    </div>
                </div>
            </div>
            <div class="admin-actions">
                <button id="admin-board-btn" class="board-btn">✓ Approve & Board to Dashboard</button>
            </div>
        </div>
        <div style="text-align: center; padding: 20px; background: #f9f9f9; border-top: 1px solid #eee;">
            <a href="client.html" style="color: #555; text-decoration: none; font-size: 13px;">← Back to Client Registration</a>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
